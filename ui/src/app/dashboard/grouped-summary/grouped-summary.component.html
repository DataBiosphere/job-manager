<div [class]="cardClass" id="container">
  <mat-card>
    <mat-card-content>
      <table matSort (matSortChange)="sortData($event)">
        <tr>
          <th mat-sort-header="label" class="label"><span>
            {{ aggregation.name }}
          </span></th>
          <ng-container *ngFor="let status of statusArray">
            <th [mat-sort-header]="status" [attr.aria-label]="status">
              <mat-icon class="status-icon job-status-icon" [ngClass]="getStatusIcon(status)" [matTooltip]="status" matTooltipPosition="left">{{getStatusIcon(status)}}</mat-icon>
            </th>
          </ng-container>
        </tr>

        <ng-container *ngFor="let entry of displayedAggregationEntries; let i = index">
          <tr *ngIf="i < numRowsToDisplay" class="data">
            <td class="label-value">
              <a [routerLink]="['/jobs']" [queryParams]="getLabelUrlParams(entry)">
                {{ entry.get(labelKey) }}
              </a>
            </td>

            <ng-container *ngFor="let status of statusArray">
              <td class="count">
                <a [routerLink]="['/jobs']" [queryParams]="getStatusUrlParams(entry, status)" [class]="getAnchorClass(entry, status)">
                  {{ entry.get(status) }}
                </a>
              </td>
            </ng-container>
          </tr>
        </ng-container>
      </table>
    </mat-card-content>
    <div class="button-container" *ngIf="displayCollapseArrow()">
      <button mat-icon-button (click)="onArrowClick()" aria-label="Toggle expand or collapse grouped summary">
          <mat-icon class="arrow">expand_more</mat-icon>
      </button>
    </div>
  </mat-card>
</div>
